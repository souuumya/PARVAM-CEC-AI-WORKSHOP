{% extends 'base.html' %}
{% block title %}Sign Up | ParvaM Auth{% endblock %}
{% block content %}
  <div class="text-center mb-4">
    <h2 class="fw-bold">Create Your Account</h2>
    <p class="text-muted">Secure signup with password strength checks and unique email/phone validation.</p>
  </div>
  <form method="POST" novalidate>
    <div class="mb-3">
      <label class="form-label text-dark">Full Name</label>
      <input type="text" name="name" class="form-control form-control-lg" value="{{ form.name }}" placeholder="Jane Doe" required>
    </div>
    <div class="mb-3">
      <label class="form-label text-dark">Email address</label>
      <input type="email" name="email" class="form-control form-control-lg" value="{{ form.email }}" placeholder="jane@company.com" required>
    </div>
    <div class="mb-3">
      <label class="form-label text-dark">Phone Number</label>
      <input type="text" name="phone" class="form-control form-control-lg" value="{{ form.phone }}" placeholder="0123456789" required>
    </div>
    <div class="mb-3">
      <label class="form-label text-dark">Password</label>
      <input type="password" name="password" class="form-control form-control-lg" placeholder="Create a strong password" required>
    </div>
    <div class="mb-4">
      <label class="form-label text-dark">Confirm Password</label>
      <input type="password" name="confirm_password" class="form-control form-control-lg" placeholder="Repeat your password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Sign Up</button>
    <p class="text-center text-dark mb-0">Already have an account? <a href="{{ url_for('login') }}" class="link-success">Login here</a>.</p>
  </form>
{% endblock %}
