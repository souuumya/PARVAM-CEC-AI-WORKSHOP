{% extends 'base.html' %}
{% block title %}Login | ParvaM Auth{% endblock %}
{% block content %}
  <div class="text-center mb-4">
    <h2 class="fw-bold">Welcome Back</h2>
    <p class="text-muted">Log in to access your personalized dashboard.</p>
  </div>
  <form method="POST" novalidate>
    <div class="mb-3">
      <label class="form-label text-dark">Email address</label>
      <input type="email" name="email" class="form-control form-control-lg" value="{{ email or '' }}" placeholder="jane@company.com" required>
    </div>
    <div class="mb-4">
      <label class="form-label text-dark">Password</label>
      <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Login</button>
    <p class="text-center text-dark-50 mb-0">Need an account? <a href="{{ url_for('signup') }}" class="link-danger">Sign up now</a>.</p>
  </form>
{% endblock %}
