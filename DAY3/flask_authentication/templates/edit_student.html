{% extends 'base.html' %}
{% block title %}Edit Student | ParvaM Auth{% endblock %}
{% block content %}
  <div class="text-center mb-4">
    <h2 class="fw-bold">Edit Student</h2>
    <p class="text-muted">Update student information.</p>
  </div>
  <form method="post">
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input type="text" class="form-control" id="name" name="name" value="{{ student.name }}" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" name="email" value="{{ student.email }}" required>
    </div>
    <div class="mb-3">
      <label for="phone" class="form-label">Phone</label>
      <input type="text" class="form-control" id="phone" name="phone" value="{{ student.phone }}" required>
    </div>
    <div class="mb-3">
      <label for="course" class="form-label">Course</label>
      <input type="text" class="form-control" id="course" name="course" value="{{ student.course or '' }}">
    </div>
    <button type="submit" class="btn btn-primary">Update Student</button>
    <a href="{{ url_for('students') }}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
